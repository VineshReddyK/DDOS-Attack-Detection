name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint tools
        run: pip install flake8 black isort mypy

      - name: black (format check)
        run: black --check src/ tests/

      - name: isort (import order)
        run: isort --check-only src/ tests/

      - name: flake8 (style)
        run: flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203,W503

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ddos-attack-detection:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  api-smoke-test:
    name: API Smoke Test
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install API dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn pydantic pyyaml httpx pytest

      - name: Start API server (no models — health only)
        run: |
          cd $GITHUB_WORKSPACE
          PYTHONPATH=src uvicorn src.api.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Health check
        run: |
          curl -f http://localhost:8000/api/v1/health

      - name: Info endpoint
        run: |
          curl -f http://localhost:8000/api/v1/info
