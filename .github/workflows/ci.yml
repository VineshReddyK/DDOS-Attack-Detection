name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint tools
        run: pip install flake8

      - name: flake8
        run: |
          flake8 src/ tests/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503,E501 \
            --exclude=src/**/__init__.py

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run tests (RF + KMeans only, no TensorFlow in CI)
        env:
          PYTHONPATH: src
        run: |
          pytest tests/test_preprocessor.py tests/test_models.py -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  api-smoke-test:
    name: API Smoke Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install API dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" pydantic pyyaml httpx pytest joblib numpy scikit-learn PyJWT slowapi prometheus-client websockets

      - name: Run API unit tests
        env:
          PYTHONPATH: src
        run: |
          pytest tests/test_api.py -v

      - name: Start API server
        env:
          PYTHONPATH: src
        run: |
          uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 6

      - name: Health check
        run: curl -f http://localhost:8000/api/v1/health

      - name: Info endpoint
        run: curl -f http://localhost:8000/api/v1/info

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, api-smoke-test]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ddos-attack-detection:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
