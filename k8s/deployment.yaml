apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddos-detection-api
  namespace: default
  labels:
    app: ddos-detection-api
    version: "2.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ddos-detection-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ddos-detection-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: YOUR_ECR_OR_REGISTRY/ddos-detection-api:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ddos-api-secrets
                  key: api-secret-key
            - name: MODELS_DIR
              value: /app/models
            - name: CONFIG_PATH
              value: /app/configs/config.yaml
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
