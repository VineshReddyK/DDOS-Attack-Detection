version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ddos-detection-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./reports:/app/reports
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
      - MODELS_DIR=/app/models
      - CORS_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  trainer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ddos-detection-trainer
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
    profiles:
      - training
    command: ["python", "src/train.py", "--data", "/app/data/raw/", "--merge"]
