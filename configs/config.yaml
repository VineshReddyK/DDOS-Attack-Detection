data:
  raw_path: "data/raw"
  processed_path: "data/processed"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  random_state: 42
  target_column: "Label"
  benign_label: "BENIGN"

features:
  drop_columns:
    - "Flow ID"
    - "Source IP"
    - "Destination IP"
    - "Timestamp"
  fill_na_strategy: "median"
  scale_method: "standard"  # standard | minmax

training:
  random_state: 42
  n_jobs: -1

random_forest:
  n_estimators: 100
  max_depth: 20
  min_samples_split: 5
  min_samples_leaf: 2
  class_weight: "balanced"

kmeans:
  n_clusters: 10
  max_iter: 300
  n_init: 10

ann:
  hidden_layers: [128, 64, 32]
  dropout_rate: 0.3
  learning_rate: 0.001
  batch_size: 256
  epochs: 50
  early_stopping_patience: 5

cnn_lstm:
  sequence_length: 10
  cnn_filters: [64, 128]
  cnn_kernel_size: 3
  lstm_units: [64, 32]
  dropout_rate: 0.3
  learning_rate: 0.001
  batch_size: 128
  epochs: 50
  early_stopping_patience: 5

output:
  models_dir: "models"
  reports_dir: "reports"
  figures_dir: "reports/figures"
